<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agis Finance AI - Pro Offline</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    
    <script src="chart.min.js"></script>
    <script src="sweetalert2.all.min.js"></script>
    <script src="lucide.min.js"></script>
    <script src="xlsx.full.min.js"></script>
    <script src="firebase-app.js"></script>
    <script src="firebase-firestore.js"></script>

    <style>
        :root {
            --bg: #0f172a; --surface: #1e293b; --primary: #2dd4bf;
            --accent: #3b82f6; --danger: #ef4444; --warning: #f59e0b;
            --text: #f8fafc; --text-dim: #94a3b8; --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(30, 41, 59, 0.7);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 100px; min-height: 100vh; }
        .container { max-width: 450px; margin: auto; padding: 20px; }

        /* Splash Screen */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; transition: 0.5s;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--surface);
            border-top: 4px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Header & Balance */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .status-badge { font-size: 10px; padding: 4px 10px; border-radius: 20px; font-weight: 800; }
        .status-online { background: rgba(45, 212, 191, 0.15); color: var(--primary); }
        .status-offline { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
        
        .master-balance { text-align: center; margin-bottom: 20px; position: relative; }
        .master-amount { font-size: 2.2rem; font-weight: 800; display: block; color: var(--primary); min-height: 50px; }
        .btn-sensor { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 5px; }

        .card { background: var(--glass); backdrop-filter: blur(10px); border-radius: 28px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        
        /* Chart Info */
        .chart-container { position: relative; text-align: center; }
        .expense-info { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); }
        .expense-label { font-size: 0.85rem; color: var(--text-dim); }
        .expense-value { font-size: 1.2rem; font-weight: 700; color: var(--danger); display: block; }

        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text); }

        .nav-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; height: 75px; background: var(--surface); border-radius: 25px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 1000; }
        .nav-item { color: var(--text-dim); cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--primary); transform: scale(1.2); }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="spinner"></div>
    <h3 style="color: var(--primary)">Agis Finance AI</h3>
</div>

<div class="container">
    <div id="home" class="page active">
        <div class="header">
            <span id="statusBadge" class="status-badge status-online">Online</span>
            <button onclick="toggleSensor()" class="btn-sensor">
                <i id="sensorIcon" data-lucide="eye"></i>
            </button>
        </div>

        <div class="master-balance">
            <span style="color:var(--text-dim)">Total Saldo</span>
            <span class="master-amount" id="total-balance">Rp 0</span>
        </div>

        <div class="card chart-container">
            <h4 style="margin-bottom:15px; font-size:0.9rem;">Distribusi Dompet</h4>
            <canvas id="pieChart" style="max-height: 180px;"></canvas>
            <div class="expense-info">
                <span class="expense-label">Total Pengeluaran Bulan Ini</span>
                <span class="expense-value" id="total-expense">Rp 0</span>
            </div>
        </div>
    </div>

    <div id="add" class="page">
        <div class="card">
            <h3 style="margin-bottom: 15px;">Tambah Catatan</h3>
            <input type="date" id="t-date">
            <select id="t-wallet">
                <option value="Tunai">Tunai</option>
                <option value="Bank">Bank</option>
                <option value="E-Wallet">E-Wallet</option>
            </select>
            <input type="number" id="t-amount" placeholder="Nominal Rp">
            <button onclick="saveTransaction()" style="width:100%; padding:15px; border-radius:15px; background:var(--primary); border:none; font-weight:bold; color:#0f172a;">SIMPAN</button>
        </div>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="nav('home', this)"><i data-lucide="home"></i></div>
    <div class="nav-item" onclick="nav('add', this)"><i data-lucide="plus-circle"></i></div>
</nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDBrKNaJsfGEVHSsPj9xWCPzZCsO_8UUJ8",
        projectId: "trackingmoney-bb785",
        appId: "1:725272276839:web:d95f1643629c97edae09c2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    db.enablePersistence({ synchronizeTabs: true }).catch(() => {});

    let store = { trans: [], wallets: { Tunai: 0, Bank: 0, "E-Wallet": 0 } };
    let myChart;
    let isHidden = false; // Status Sensor

    window.onload = () => {
        lucide.createIcons();
        document.getElementById('t-date').valueAsDate = new Date();
        
        // Listener Database
        db.collection("config").doc("wallets").onSnapshot(doc => {
            if(doc.exists()) store.wallets = doc.data();
            renderUI();
        });

        db.collection("pengeluaran").onSnapshot(snap => {
            store.trans = snap.docs.map(d => d.data());
            renderUI();
        });

        setTimeout(() => {
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 500);
        }, 1000);
    };

    function toggleSensor() {
        isHidden = !isHidden;
        const icon = document.getElementById('sensorIcon');
        icon.setAttribute('data-lucide', isHidden ? 'eye-off' : 'eye');
        lucide.createIcons();
        renderUI();
    }

    function renderUI() {
        // Hitung Saldo
        const totalSaldo = Object.values(store.wallets).reduce((a, b) => a + b, 0);
        document.getElementById('total-balance').innerText = isHidden ? "Rp ••••••" : "Rp " + totalSaldo.toLocaleString('id-ID');

        // Hitung Pengeluaran
        const totalExp = store.trans.reduce((a, b) => a + (b.nominal || 0), 0);
        document.getElementById('total-expense').innerText = isHidden ? "Rp ••••••" : "Rp " + totalExp.toLocaleString('id-ID');

        updateChart();
    }

    function updateChart() {
        const ctx = document.getElementById('pieChart').getContext('2d');
        if (myChart) myChart.destroy();
        
        // Jika sensor aktif, tampilkan data dummy tapi label tetap
        const chartData = isHidden ? [1, 1, 1] : Object.values(store.wallets);

        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(store.wallets),
                datasets: [{
                    data: chartData,
                    backgroundColor: ['#2dd4bf', '#3b82f6', '#f59e0b'],
                    borderWidth: 0
                }]
            },
            options: { 
                plugins: { 
                    legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 10 } } },
                    tooltip: { enabled: !isHidden } // Matikan tooltip kalau lagi disensor
                },
                cutout: '70%'
            }
        });
    }

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    async function saveTransaction() {
        const amt = parseInt(document.getElementById('t-amount').value);
        const wallet = document.getElementById('t-wallet').value;
        const date = document.getElementById('t-date').value;

        if(!amt) return Swal.fire('Error', 'Isi nominal!', 'error');

        await db.collection("pengeluaran").add({ nominal: amt, dompet: wallet, tanggal: date });
        const newSaldo = (store.wallets[wallet] || 0) - amt;
        await db.collection("config").doc("wallets").update({ [wallet]: newSaldo });

        Swal.fire('Sukses', 'Tersimpan!', 'success');
        document.getElementById('t-amount').value = '';
        nav('home', document.querySelector('.nav-item'));
    }
</script>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js');
    }
</script>
</body>
</html>
