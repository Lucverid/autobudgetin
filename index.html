<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agis Finance AI - CDN Stable</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --bg: #0f172a; --surface: #1e293b; --primary: #2dd4bf;
            --accent: #3b82f6; --danger: #ef4444; --warning: #f59e0b;
            --text: #f8fafc; --text-dim: #94a3b8; --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(30, 41, 59, 0.7);
        }
        body.light-mode {
            --bg: #f8fafc; --surface: #ffffff; --text: #0f172a;
            --text-dim: #64748b; --border: rgba(0,0,0,0.06);
            --glass: rgba(255, 255, 255, 0.8);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 100px; min-height: 100vh; transition: 0.3s; overflow-x: hidden; }
        .container { max-width: 450px; margin: auto; padding: 20px; }

        /* Splash Screen */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--surface); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Header & Status */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        #statusBadge { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .master-balance { text-align: center; margin-bottom: 20px; }
        .master-amount { font-size: 2.2rem; font-weight: 800; color: var(--primary); display: block; }
        
        .card { background: var(--glass); backdrop-filter: blur(10px); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .w-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .w-card { background: var(--surface); flex: 1; padding: 15px; border-radius: 20px; text-align: center; border: 1px solid var(--border); }

        /* Transactions */
        .t-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); align-items: center; }
        .t-amt { color: var(--danger); font-weight: bold; }

        /* Bottom Nav */
        .nav-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 70px; background: var(--surface); border-radius: 22px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; }
        .nav-item { color: var(--text-dim); cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: var(--primary); transform: scale(1.1); }
        
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        input, select { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text); }
        .btn-save { width: 100%; padding: 16px; border-radius: 15px; background: var(--primary); border: none; font-weight: 800; color: #0f172a; cursor: pointer; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="spinner"></div>
    <h3 style="margin-top:20px; color:var(--primary)">AGIS FINANCE AI</h3>
</div>

<div class="container">
    <div id="home" class="page active">
        <div class="header">
            <span id="statusBadge">Checking...</span>
            <button onclick="document.body.classList.toggle('light-mode')" style="background:none; border:none; color:var(--text-dim);"><i data-lucide="sun-moon"></i></button>
        </div>
        <div class="master-balance">
            <small style="color:var(--text-dim)">Sisa Saldo Aman</small>
            <span class="master-amount" id="total-balance">Rp 0</span>
            <small id="goal-tag" style="color:var(--warning)"></small>
        </div>
        <div class="w-container">
            <div class="w-card"><small>Tunai</small><span class="w-val" id="w-cash" style="display:block; font-weight:800;">0</span></div>
            <div class="w-card"><small>Bank</small><span class="w-val" id="w-bank" style="display:block; font-weight:800;">0</span></div>
            <div class="w-card"><small>E-Wallet</small><span class="w-val" id="w-e" style="display:block; font-weight:800;">0</span></div>
        </div>
        <div class="card">
            <div style="height: 200px;"><canvas id="pieChart"></canvas></div>
            <div id="ai-insight" style="margin-top:15px; font-size:0.8rem; border-top:1px solid var(--border); padding-top:10px; color:var(--primary)"></div>
        </div>
    </div>

    <div id="history" class="page">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <h3>Riwayat</h3>
            <button onclick="exportToExcel()" style="color:var(--primary); background:none; border:none; font-size:0.7rem; font-weight:bold;">UNDUH EXCEL</button>
        </div>
        <input type="month" id="filterMonth" onchange="renderAll()">
        <div id="transList"></div>
    </div>

    <div id="add" class="page">
        <div class="card">
            <h3>Input Pengeluaran</h3><br>
            <input type="date" id="t-date">
            <select id="t-wallet">
                <option value="Tunai">💰 Tunai</option>
                <option value="Bank">🏦 Bank</option>
                <option value="E-Wallet">📱 E-Wallet</option>
            </select>
            <select id="t-cat">
                <option>Makan & Minum</option>
                <option>Transportasi</option>
                <option>Belanja</option>
                <option>Tagihan</option>
                <option>Hiburan</option>
                <option>Lainnya</option>
            </select>
            <input type="number" id="t-amount" placeholder="Nominal Rp">
            <button class="btn-save" onclick="saveTransaction()">SIMPAN TRANSAKSI</button>
        </div>
    </div>

    <div id="settings" class="page">
        <div class="card">
            <h3>Update Saldo</h3><br>
            <input type="number" id="set-cash" placeholder="Saldo Tunai">
            <input type="number" id="set-bank" placeholder="Saldo Bank">
            <input type="number" id="set-e" placeholder="Saldo E-Wallet">
            <button class="btn-save" onclick="updateWallets()">SIMPAN SALDO</button>
            <hr style="margin:20px 0; opacity:0.1">
            <input type="number" id="goal-input" placeholder="Target Nabung Bulanan">
            <button class="btn-save" style="background:var(--warning)" onclick="setGoal()">SIMPAN TARGET</button>
        </div>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="nav('home', this)"><i data-lucide="layout-grid"></i></div>
    <div class="nav-item" onclick="nav('history', this)"><i data-lucide="receipt"></i></div>
    <div class="nav-item" onclick="nav('add', this)"><i data-lucide="plus-circle" style="width:30px; height:30px; color:var(--primary)"></i></div>
    <div class="nav-item" onclick="nav('settings', this)"><i data-lucide="sliders"></i></div>
</nav>

<script type="module">
    // FIREBASE SDK VIA CDN (ESM.SH)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, query, orderBy, enableIndexedDbPersistence, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDBrKNaJsfGEVHSsPj9xWCPzZCsO_8UUJ8",
        projectId: "trackingmoney-bb785",
        appId: "1:725272276839:web:d95f1643629c97edae09c2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Aktifkan Offline Persistence
    enableIndexedDbPersistence(db).catch(() => console.warn("Persistence failed"));

    let store = { trans: [], wallets: { Tunai: 0, Bank: 0, "E-Wallet": 0 }, goal: 0 };
    let pieChart;

    const fmt = (n) => "Rp " + new Intl.NumberFormat('id-ID').format(n);

    window.onload = () => {
        lucide.createIcons();
        document.getElementById('t-date').valueAsDate = new Date();
        document.getElementById('filterMonth').value = new Date().toISOString().slice(0,7);
        setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 2000);
    };

    window.nav = (id, el) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    };

    // --- HYBRID ACTIONS ---
    window.saveTransaction = async () => {
        const d = document.getElementById('t-date').value;
        const w = document.getElementById('t-wallet').value;
        const c = document.getElementById('t-cat').value;
        const a = parseInt(document.getElementById('t-amount').value);

        if (!a || !d) return Swal.fire('Lengkapi data!', '', 'warning');
        if (store.wallets[w] < a) return Swal.fire('Saldo Kurang!', '', 'error');

        try {
            // Optimistic Update Saldo
            await updateDoc(doc(db, "config", "wallets"), { [w]: store.wallets[w] - a });
            // Simpan Riwayat
            await addDoc(collection(db, "pengeluaran"), { 
                tanggal: d, dompet: w, kategori: c, nominal: a, timestamp: Date.now() 
            });
            
            document.getElementById('t-amount').value = "";
            Swal.fire({ title: 'Tersimpan!', icon: 'success', timer: 1000, showConfirmButton: false });
            nav('home', document.querySelectorAll('.nav-item')[0]);
        } catch (e) {
            Swal.fire('Error', e.message, 'error');
        }
    };

    window.updateWallets = async () => {
        const data = {
            Tunai: parseInt(document.getElementById('set-cash').value) || store.wallets.Tunai,
            Bank: parseInt(document.getElementById('set-bank').value) || store.wallets.Bank,
            "E-Wallet": parseInt(document.getElementById('set-e').value) || store.wallets["E-Wallet"]
        };
        await setDoc(doc(db, "config", "wallets"), data);
        Swal.fire('Updated!', '', 'success');
    };

    window.setGoal = async () => {
        const val = parseInt(document.getElementById('goal-input').value) || 0;
        await setDoc(doc(db, "config", "goal"), { amount: val });
        Swal.fire('Target Disimpan!', '', 'success');
    };

    window.renderAll = () => {
        const activeMonth = document.getElementById('filterMonth').value;
        let catMap = {};
        const listHtml = document.getElementById('transList');
        listHtml.innerHTML = "";

        store.trans.forEach(t => {
            if(t.tanggal.startsWith(activeMonth)) {
                catMap[t.kategori] = (catMap[t.kategori] || 0) + t.nominal;
                listHtml.innerHTML += `
                    <div class="t-item">
                        <div><b>${t.kategori}</b><br><small>${t.tanggal} • ${t.dompet}</small></div>
                        <div class="t-amt">- ${fmt(t.nominal)}</div>
                    </div>`;
            }
        });

        const totalCash = (store.wallets.Tunai || 0) + (store.wallets.Bank || 0) + (store.wallets["E-Wallet"] || 0);
        const disposable = totalCash - store.goal;
        
        document.getElementById('total-balance').innerText = fmt(disposable);
        document.getElementById('goal-tag').innerText = store.goal > 0 ? `(Target Nabung: ${fmt(store.goal)})` : "";
        document.getElementById('w-cash').innerText = fmt(store.wallets.Tunai);
        document.getElementById('w-bank').innerText = fmt(store.wallets.Bank);
        document.getElementById('w-e').innerText = fmt(store.wallets["E-Wallet"]);

        // AI Insight
        const now = new Date();
        const daysLeft = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate() - now.getDate() + 1;
        const daily = disposable > 0 ? (disposable / daysLeft) : 0;
        document.getElementById('ai-insight').innerHTML = disposable > 0 
            ? `💡 Sisa hari: ${daysLeft}. Jatah harian kamu: <b>${fmt(Math.floor(daily))}</b>`
            : "⚠️ Agis, pengeluaran kamu sudah melewati batas tabungan!";

        updateChart(catMap);
    };

    function updateChart(data) {
        const ctx = document.getElementById('pieChart').getContext('2d');
        if(pieChart) pieChart.destroy();
        pieChart = new Chart(ctx, {
            type: 'doughnut',
            data: { 
                labels: Object.keys(data), 
                datasets: [{ data: Object.values(data), backgroundColor: ['#2dd4bf','#3b82f6','#f59e0b','#ef4444','#a855f7'], borderWidth: 0 }] 
            },
            options: { maintainAspectRatio: false, cutout: '78%', plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 10 } } } } }
        });
    }

    // --- DATA SYNC & INDICATOR ---
    onSnapshot(doc(db, "config", "wallets"), (s) => { if(s.exists()) store.wallets = s.data(); renderAll(); });
    onSnapshot(doc(db, "config", "goal"), (s) => { if(s.exists()) store.goal = s.data().amount; renderAll(); });
    onSnapshot(query(collection(db, "pengeluaran"), orderBy("tanggal", "desc")), (s) => {
        store.trans = s.docs.map(d => ({id:d.id, ...d.data()}));
        
        const badge = document.getElementById('statusBadge');
        if (s.metadata.hasPendingWrites) {
            badge.innerText = "☁️ SYNCING..."; badge.style.color = "var(--warning)";
        } else {
            badge.innerText = navigator.onLine ? "✅ SYNCED" : "📴 OFFLINE";
            badge.style.color = navigator.onLine ? "var(--primary)" : "var(--text-dim)";
        }
        renderAll();
    });

    window.exportToExcel = () => {
        const ws = XLSX.utils.json_to_sheet(store.trans);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Data");
        XLSX.writeFile(wb, "Keuangan_Agis.xlsx");
    };
</script>
</body>
</html>
