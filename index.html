<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agis Finance AI - v19.3</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a; --surface: #1e293b; --primary: #2dd4bf;
            --accent: #3b82f6; --danger: #ef4444; --warning: #f59e0b;
            --text: #f8fafc; --text-dim: #94a3b8; --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(30, 41, 59, 0.7);
        }
        body.light-mode {
            --bg: #f8fafc; --surface: #ffffff; --text: #0f172a;
            --text-dim: #64748b; --border: rgba(0,0,0,0.06);
            --glass: rgba(255, 255, 255, 0.8);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg); color: var(--text); padding-bottom: 110px; min-height: 100vh; transition: background 0.3s; overflow-x: hidden; }
        .container { max-width: 500px; margin: auto; padding: 20px; }

        /* Splash Screen Fix */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10000;
            transition: all 0.5s ease;
        }
        .spinner { width: 45px; height: 45px; border: 4px solid var(--surface); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Privacy Blur */
        .blur-active .master-amount, .blur-active .w-val, .blur-active .t-amt, 
        .blur-active #goal-amount, .blur-active #chart-total-val, .blur-active .adv-scrollable {
            filter: blur(12px); pointer-events: none; user-select: none;
        }

        /* UI Elements */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .status-badge { font-size: 10px; padding: 4px 10px; border-radius: 12px; font-weight: 800; text-transform: uppercase; }
        .status-online { background: rgba(45, 212, 191, 0.15); color: var(--primary); }
        .status-offline { background: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid var(--danger); }
        .btn-icon { background: var(--surface); border: 1px solid var(--border); color: var(--text); width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .master-balance { text-align: center; margin-bottom: 8px; }
        .master-amount { font-size: clamp(2rem, 9vw, 2.8rem); font-weight: 800; display: block; letter-spacing: -1.5px; }
        .goal-info { text-align: center; font-size: 0.85rem; color: var(--warning); margin-bottom: 30px; font-weight: 600; cursor: pointer; }

        /* Wallets */
        .wallet-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .w-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 18px 8px; display: flex; flex-direction: column; align-items: center; min-width: 0; }
        .w-icon { width: 46px; height: 46px; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
        .w-icon i { width: 22px !important; height: 22px !important; }
        .w-name { font-size: 0.6rem; color: var(--text-dim); font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .w-val { font-size: clamp(0.6rem, 3vw, 0.8rem); font-weight: 800; width: 100%; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* History */
        .t-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--border); }
        .t-info { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .t-cat-name { font-weight: 700; font-size: 0.95rem; }
        .t-sub-info { font-size: 0.75rem; color: var(--text-dim); display: flex; gap: 6px; }
        .t-amt { font-weight: 800; font-size: 0.9rem; color: var(--danger); }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; height: 75px; background: var(--surface); border-radius: 28px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.4); z-index: 1000; border: 1px solid var(--border); max-width: 460px; margin: 0 auto; }
        .nav-item { color: var(--text-dim); cursor: pointer; transition: 0.3s; padding: 10px; }
        .nav-item.active { color: var(--primary); transform: translateY(-5px); }

        .card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 30px; padding: 22px; margin-bottom: 20px; border: 1px solid var(--border); }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #0f172a; padding: 18px; border-radius: 18px; border: none; font-weight: 800; width: 100%; cursor: pointer; }
        
        .page { display: none; }
        .page.active { display: block; }
        input, select { width: 100%; padding: 16px; border-radius: 18px; border: 1px solid var(--border); background: var(--surface); color: var(--text); margin-bottom: 12px; outline: none; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="spinner"></div>
    <h3 style="letter-spacing: 3px; font-weight: 800;">AGIS FINANCE</h3>
    <p id="splash-status" style="color:var(--text-dim); font-size:0.8rem; margin-top: 10px;">Connecting to Database...</p>
</div>

<div class="container">
    <div id="home" class="page active">
        <div class="header">
            <div style="display:flex; gap:10px; align-items:center">
                <span id="statusBadge" class="status-badge status-online">Online</span>
                <button onclick="togglePrivacy()" class="btn-icon" id="privacyBtn"><i data-lucide="eye"></i></button>
            </div>
            <button onclick="toggleTheme()" class="btn-icon"><i data-lucide="sun-moon"></i></button>
        </div>

        <div class="master-balance">
            <span style="font-size: 0.7rem; color: var(--text-dim); font-weight: 800; text-transform: uppercase;">Saldo Tersedia</span>
            <span class="master-amount" id="total-balance">Rp 0</span>
        </div>
        
        <div class="goal-info" onclick="nav('settings')">
            <i data-lucide="target" style="width:14px; margin-right:5px"></i>
            Tabungan: <span id="goal-amount">Rp 0</span>
        </div>

        <div class="wallet-container">
            <div class="w-card">
                <div class="w-icon" style="background:rgba(45,212,191,0.1)"><i data-lucide="banknote" style="color:var(--primary)"></i></div>
                <span class="w-name">Tunai</span>
                <span class="w-val" id="w-cash">0</span>
            </div>
            <div class="w-card">
                <div class="w-icon" style="background:rgba(59,130,246,0.1)"><i data-lucide="landmark" style="color:var(--accent)"></i></div>
                <span class="w-name">Bank</span>
                <span class="w-val" id="w-bank">0</span>
            </div>
            <div class="w-card">
                <div class="w-icon" style="background:rgba(245,158,11,0.1)"><i data-lucide="smartphone" style="color:var(--warning)"></i></div>
                <span class="w-name">E-Wallet</span>
                <span class="w-val" id="w-e">0</span>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center">
                <div style="font-weight:700; display:flex; align-items:center; gap:8px"><i data-lucide="pie-chart"></i> Pengeluaran</div>
                <div id="chart-total-val" style="font-weight:800; color:var(--danger)">Rp 0</div>
            </div>
            <div style="height:220px;"><canvas id="pieChart"></canvas></div>
        </div>
    </div>

    <div id="history" class="page">
        <div class="card">
            <h2 style="font-size:1rem; margin-bottom:15px">Riwayat</h2>
            <input type="month" id="filterMonth" onchange="renderAll()">
            <div id="transList" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>

    <div id="add" class="page">
        <div class="card">
            <h2 style="font-size:1rem; margin-bottom:15px">Catat Baru</h2>
            <form id="transForm">
                <input type="date" id="t-date">
                <select id="t-wallet">
                    <option value="Tunai">💰 Tunai</option><option value="Bank">🏦 Bank</option><option value="E-Wallet">📱 E-Wallet</option>
                </select>
                <select id="t-cat">
                    <option>Makan & Minum</option><option>Transportasi</option><option>Belanja</option><option>Tagihan</option><option>Hiburan</option><option>Lainnya</option>
                </select>
                <input type="number" id="t-amount" placeholder="Nominal" inputmode="numeric">
            </form>
            <button class="btn-primary" onclick="saveTransaction()">Simpan</button>
        </div>
    </div>

    <div id="settings" class="page">
        <div class="card">
            <h2 style="font-size:1rem; margin-bottom:15px">Update Saldo</h2>
            <input type="number" id="set-cash" placeholder="Saldo Tunai">
            <input type="number" id="set-bank" placeholder="Saldo Bank">
            <input type="number" id="set-e" placeholder="Saldo E-Wallet">
            <button class="btn-primary" onclick="updateWallets()">Simpan</button>
        </div>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="nav('home', this)"><i data-lucide="layout-grid"></i></div>
    <div class="nav-item" onclick="nav('history', this)"><i data-lucide="receipt"></i></div>
    <div class="nav-item" onclick="nav('add', this)"><i data-lucide="plus-circle" style="width:30px; height:30px; color:var(--primary)"></i></div>
    <div class="nav-item" onclick="nav('settings', this)"><i data-lucide="sliders"></i></div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, setDoc, query, orderBy, enableIndexedDbPersistence, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDBrKNaJsfGEVHSsPj9xWCPzZCsO_8UUJ8", authDomain: "trackingmoney-bb785.firebaseapp.com", projectId: "trackingmoney-bb785", storageBucket: "trackingmoney-bb785.firebasestorage.app", messagingSenderId: "725272276839", appId: "1:725272276839:web:d95f1643629c97edae09c2" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Aktifkan Offline secara background (biar gak macet)
    enableIndexedDbPersistence(db, { synchronizeTabs: true }).catch((err) => console.log("Offline disabled"));

    let store = { trans: [], wallets: { Tunai: 0, Bank: 0, "E-Wallet": 0 }, goal: 0 };
    let pieChart;
    const fmt = (n) => "Rp " + new Intl.NumberFormat('id-ID').format(n || 0);

    // Fungsi Hilangkan Splash Screen
    const hideSplash = () => {
        const splash = document.getElementById('splash-screen');
        if (splash) {
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 500);
        }
    };

    // Fallback: Jika database lemot, tetap buka aplikasi setelah 5 detik
    setTimeout(hideSplash, 5000);

    window.nav = (id, el) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) el.classList.add('active');
    };

    window.togglePrivacy = () => {
        const isBlur = document.body.classList.toggle('blur-active');
        localStorage.setItem('agis_privacy', isBlur);
        document.getElementById('privacyBtn').innerHTML = isBlur ? '<i data-lucide="eye-off"></i>' : '<i data-lucide="eye"></i>';
        lucide.createIcons();
    };

    window.saveTransaction = async () => {
        const d = document.getElementById('t-date').value;
        const w = document.getElementById('t-wallet').value;
        const c = document.getElementById('t-cat').value;
        const a = parseInt(document.getElementById('t-amount').value);
        if(!a || !d) return Swal.fire('Error', 'Data belum lengkap', 'warning');
        try {
            await updateDoc(doc(db, "config", "wallets"), { [w]: increment(-a) });
            await addDoc(collection(db, "pengeluaran"), { tanggal: d, dompet: w, kategori: c, nominal: a });
            nav('home');
        } catch (e) { console.log(e); }
    };

    window.updateWallets = async () => {
        const data = { Tunai: parseInt(document.getElementById('set-cash').value) || 0, Bank: parseInt(document.getElementById('set-bank').value) || 0, "E-Wallet": parseInt(document.getElementById('set-e').value) || 0 };
        await setDoc(doc(db, "config", "wallets"), data);
        Swal.fire('Sukses', 'Saldo diperbarui', 'success');
    };

    window.renderAll = () => {
        const month = document.getElementById('filterMonth').value;
        let cats = {}; let totalSpent = 0;
        const list = document.getElementById('transList');
        if (list) list.innerHTML = "";

        store.trans.forEach(t => {
            if(!month || (t.tanggal && t.tanggal.startsWith(month))) {
                cats[t.kategori] = (cats[t.kategori] || 0) + t.nominal;
                totalSpent += t.nominal;
                if (list) list.innerHTML += `
                <div class="t-item">
                    <div class="t-info"><span class="t-cat-name">${t.kategori}</span><div class="t-sub-info"><span>${t.tanggal}</span><span>•</span><span>${t.dompet}</span></div></div>
                    <div class="t-amt">- ${fmt(t.nominal)}</div>
                </div>`;
            }
        });

        document.getElementById('total-balance').innerText = fmt((store.wallets.Tunai + store.wallets.Bank + store.wallets["E-Wallet"]) - store.goal);
        document.getElementById('goal-amount').innerText = fmt(store.goal);
        document.getElementById('w-cash').innerText = fmt(store.wallets.Tunai);
        document.getElementById('w-bank').innerText = fmt(store.wallets.Bank);
        document.getElementById('w-e').innerText = fmt(store.wallets["E-Wallet"]);
        document.getElementById('chart-total-val').innerText = fmt(totalSpent);

        updateChart(cats);
        lucide.createIcons();
        hideSplash(); // Pastikan splash hilang saat data pertama kali masuk
    };

    function updateChart(data) {
        const ctx = document.getElementById('pieChart').getContext('2d');
        if(pieChart) pieChart.destroy();
        pieChart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: Object.keys(data), datasets: [{ data: Object.values(data), backgroundColor: ['#2dd4bf','#3b82f6','#f59e0b','#ef4444','#a855f7'], borderWidth: 0 }] },
            options: { maintainAspectRatio: false, cutout: '78%', plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', boxWidth: 10 } } } }
        });
    }

    // Monitoring Status Koneksi
    const updateStatus = () => {
        const b = document.getElementById('statusBadge');
        b.innerText = navigator.onLine ? "Online" : "Offline";
        b.className = `status-badge ${navigator.onLine ? 'status-online' : 'status-offline'}`;
    };
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();

    // Data Listeners
    onSnapshot(doc(db, "config", "wallets"), (s) => { if(s.exists()) store.wallets = s.data(); renderAll(); });
    onSnapshot(doc(db, "config", "goal"), (s) => { if(s.exists()) store.goal = s.data().amount; renderAll(); });
    onSnapshot(query(collection(db, "pengeluaran"), orderBy("tanggal", "desc")), (s) => { 
        store.trans = s.docs.map(d => ({id:d.id, ...d.data()})); 
        renderAll(); 
    });

    window.addEventListener('load', () => {
        document.getElementById('t-date').valueAsDate = new Date();
        document.getElementById('filterMonth').value = new Date().toISOString().slice(0,7);
        lucide.createIcons();
    });
</script>
</body>
</html>
