<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agis Finance AI - Pro Offline</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    
    <script src="libs/chart.min.js"></script>
    <script src="libs/sweetalert2.all.min.js"></script>
    <script src="libs/lucide.min.js"></script>
    <script src="libs/xlsx.full.min.js"></script>

    <script src="libs/firebase-app.js"></script>
    <script src="libs/firebase-firestore.js"></script>

    <style>
        /* CSS tetap sama seperti sebelumnya, pastikan font juga lokal jika ingin 100% offline */
        :root {
            --bg: #0f172a; --surface: #1e293b; --primary: #2dd4bf;
            --accent: #3b82f6; --danger: #ef4444; --warning: #f59e0b;
            --text: #f8fafc; --text-dim: #94a3b8; --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(30, 41, 59, 0.7);
        }
        body.light-mode {
            --bg: #f8fafc; --surface: #ffffff; --text: #0f172a;
            --text-dim: #64748b; --border: rgba(0,0,0,0.06);
            --glass: rgba(255, 255, 255, 0.8);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 100px; min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 450px; margin: auto; padding: 20px; }

        /* Splash Screen */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--surface);
            border-top: 4px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* UI Components */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .status-badge { font-size: 10px; padding: 4px 10px; border-radius: 20px; font-weight: 800; }
        .status-online { background: rgba(45, 212, 191, 0.15); color: var(--primary); }
        .status-offline { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
        .master-balance { text-align: center; margin-bottom: 10px; }
        .master-amount { font-size: 2.4rem; font-weight: 800; display: block; }
        .card { background: var(--glass); backdrop-filter: blur(10px); border-radius: 28px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        
        /* Navigation */
        .nav-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; height: 75px; background: var(--surface); border-radius: 25px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 1000; }
        .nav-item { color: var(--text-dim); cursor: pointer; padding: 10px; }
        .nav-item.active { color: var(--primary); }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="spinner"></div>
    <h3 id="splash-text">Menyiapkan Database Lokal...</h3>
</div>

<div class="container">
    <div id="home" class="page active">
        <div class="header">
            <span id="statusBadge" class="status-badge status-online">Online</span>
            <button onclick="toggleTheme()" style="background:none; border:none; color:var(--text-dim);"><i data-lucide="sun-moon"></i></button>
        </div>
        <div class="master-balance">
            <span style="color:var(--text-dim)">Saldo Bersih</span>
            <span class="master-amount" id="total-balance">Rp 0</span>
        </div>
        <div id="advisorContent" class="card" style="font-size: 0.9rem; border-left: 4px solid var(--primary);">
            Menganalisis...
        </div>
        <div class="card">
            <canvas id="pieChart" style="height: 200px;"></canvas>
        </div>
    </div>

    <div id="add" class="page">
        <div class="card">
            <h3>Catat Pengeluaran</h3><br>
            <input type="date" id="t-date">
            <select id="t-wallet">
                <option value="Tunai">Tunai</option>
                <option value="Bank">Bank</option>
                <option value="E-Wallet">E-Wallet</option>
            </select>
            <input type="number" id="t-amount" placeholder="Nominal">
            <button class="btn-primary" onclick="saveTransaction()" style="width:100%; padding:15px; border-radius:15px; background:var(--primary); border:none; font-weight:bold;">Simpan</button>
        </div>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="nav('home', this)"><i data-lucide="home"></i></div>
    <div class="nav-item" onclick="nav('add', this)"><i data-lucide="plus-circle"></i></div>
</nav>

<script>
    // Versi 8 Compat (Bisa jalan tanpa type="module")
    const firebaseConfig = {
        apiKey: "AIzaSyDBrKNaJsfGEVHSsPj9xWCPzZCsO_8UUJ8",
        projectId: "trackingmoney-bb785",
        appId: "1:725272276839:web:d95f1643629c97edae09c2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // AKTIFKAN OFFLINE PERSISTENCE
    firebase.firestore().enablePersistence({ synchronizeTabs: true })
        .catch(err => console.error("Persistence error", err));

    let store = { trans: [], wallets: { Tunai: 0, Bank: 0, "E-Wallet": 0 } };

    // Init App
    window.onload = () => {
        lucide.createIcons();
        document.getElementById('t-date').valueAsDate = new Date();
        
        // Listener Realtime (Tetap jalan meski offline pakai cache)
        db.collection("config").doc("wallets").onSnapshot(doc => {
            if(doc.exists()) store.wallets = doc.data();
            renderUI();
        });

        db.collection("pengeluaran").orderBy("tanggal", "desc").onSnapshot(snap => {
            store.trans = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderUI();
        });

        setTimeout(() => {
            document.getElementById('splash-screen').style.display = 'none';
        }, 1000);
    };

    function renderUI() {
        const total = store.wallets.Tunai + store.wallets.Bank + store.wallets["E-Wallet"];
        document.getElementById('total-balance').innerText = "Rp " + total.toLocaleString();
        // Update Chart & Advisor disini...
    }

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    async function saveTransaction() {
        const amt = parseInt(document.getElementById('t-amount').value);
        const wallet = document.getElementById('t-wallet').value;
        
        // Simpan ke Firestore (Akan masuk antrian offline jika tidak ada sinyal)
        await db.collection("pengeluaran").add({
            nominal: amt,
            dompet: wallet,
            tanggal: document.getElementById('t-date').value
        });
        
        // Update Saldo (Local update dulu, nanti sync ke cloud)
        const newSaldo = store.wallets[wallet] - amt;
        await db.collection("config").doc("wallets").update({ [wallet]: newSaldo });
        
        Swal.fire('Tersimpan!', '', 'success');
        nav('home', document.querySelector('.nav-item'));
    }
</script>
</body>
</html>
